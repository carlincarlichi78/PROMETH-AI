validaciones:
  - regla: "casilla_27 == casilla_03 + casilla_06 + casilla_09 + casilla_12 + casilla_15 + casilla_18 + casilla_21 + casilla_24 + casilla_26 + casilla_77"
    nivel: error
    mensaje: "Total cuotas devengadas (casilla 27) no cuadra con la suma de cuotas por tipo"

  - regla: "casilla_37 == casilla_29 + casilla_31 + casilla_33 + casilla_35 + casilla_36 + casilla_40 + casilla_41"
    nivel: error
    mensaje: "Total a deducir (casilla 37) no coincide con la suma de cuotas soportadas mas regularizaciones"

  - regla: "casilla_45 == casilla_27 - casilla_37"
    nivel: error
    mensaje: "Diferencia (casilla 45) no es casilla_27 menos casilla_37"

  - regla: "casilla_65 == casilla_45"
    nivel: advertencia
    mensaje: "Resultado final (casilla 65) deberia coincidir con la diferencia (casilla 45) salvo regularizaciones adicionales"

  - regla: "casilla_67 == casilla_65 - casilla_66"
    nivel: error
    mensaje: "Resultado complementario (casilla 67) no es casilla_65 menos la suma de trimestres ingresados"

  - regla: "casilla_84 >= 0 and casilla_84 <= 100"
    nivel: error
    mensaje: "Porcentaje de prorrata (casilla 84) debe estar entre 0 y 100"
