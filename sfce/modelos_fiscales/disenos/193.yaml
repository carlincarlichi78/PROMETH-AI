modelo: "193"
version: "2025"
descripcion: "Resumen anual retenciones e ingresos a cuenta — Rendimientos del capital mobiliario"
periodicidad: anual
tipo_formato: posicional
longitud_registro: 500

registros:
  - tipo: declarante
    repetible: false
    campos:
      - nombre: tipo_registro
        posicion: [1, 1]
        tipo: alfanumerico
        valor_fijo: "1"
        descripcion: "Tipo de registro declarante"

      - nombre: modelo
        posicion: [2, 4]
        tipo: alfanumerico
        valor_fijo: "193"
        descripcion: "Numero de modelo"

      - nombre: ejercicio
        posicion: [5, 8]
        tipo: numerico
        longitud: 4
        fuente: "ejercicio"
        descripcion: "Ejercicio fiscal (AAAA)"

      - nombre: nif_declarante
        posicion: [9, 17]
        tipo: alfanumerico
        longitud: 9
        fuente: "nif_declarante"
        descripcion: "NIF del declarante"

      - nombre: nombre_declarante
        posicion: [18, 57]
        tipo: alfanumerico
        longitud: 40
        fuente: "nombre_declarante"
        descripcion: "Apellidos y nombre o razon social"

      - nombre: tipo_soporte
        posicion: [58, 58]
        tipo: alfanumerico
        longitud: 1
        valor_fijo: "T"
        descripcion: "Tipo soporte"

      - nombre: telefono_contacto
        posicion: [59, 67]
        tipo: telefono
        longitud: 9
        fuente: "empresa.telefono"
        descripcion: "Telefono de contacto"

      - nombre: nombre_contacto
        posicion: [68, 102]
        tipo: alfanumerico
        longitud: 35
        fuente: "empresa.nombre_contacto"
        descripcion: "Nombre persona de contacto"

      - nombre: num_total_registros
        posicion: [103, 111]
        tipo: numerico
        longitud: 9
        fuente: "casillas.num_registros"
        descripcion: "Numero total de registros de perceptores"

      - nombre: casilla_10
        posicion: [112, 128]
        tipo: numerico_signo
        longitud: 17
        decimales: 2
        fuente: "casillas.10"
        descripcion: "Total percepciones dinerarias"

      - nombre: casilla_11
        posicion: [129, 145]
        tipo: numerico_signo
        longitud: 17
        decimales: 2
        fuente: "casillas.11"
        descripcion: "Total retenciones e ingresos a cuenta dinerarias"

      - nombre: casilla_12
        posicion: [146, 162]
        tipo: numerico_signo
        longitud: 17
        decimales: 2
        fuente: "casillas.12"
        descripcion: "Total percepciones en especie (valoracion)"

      - nombre: casilla_13
        posicion: [163, 179]
        tipo: numerico_signo
        longitud: 17
        decimales: 2
        fuente: "casillas.13"
        descripcion: "Total ingresos a cuenta percepciones en especie"

      - nombre: blancos_180_500
        posicion: [180, 500]
        tipo: alfanumerico
        longitud: 321
        valor_fijo: ""
        descripcion: "Blancos hasta fin de registro"

  - tipo: perceptor
    repetible: true
    campos:
      - nombre: tipo_registro
        posicion: [1, 1]
        tipo: alfanumerico
        valor_fijo: "2"
        descripcion: "Tipo de registro perceptor"

      - nombre: modelo
        posicion: [2, 4]
        tipo: alfanumerico
        valor_fijo: "193"
        descripcion: "Numero de modelo"

      - nombre: ejercicio
        posicion: [5, 8]
        tipo: numerico
        longitud: 4
        fuente: "ejercicio"
        descripcion: "Ejercicio fiscal"

      - nombre: nif_declarante
        posicion: [9, 17]
        tipo: alfanumerico
        longitud: 9
        fuente: "nif_declarante"
        descripcion: "NIF del declarante"

      - nombre: nif_perceptor
        posicion: [18, 26]
        tipo: alfanumerico
        longitud: 9
        fuente: "declarado.nif"
        descripcion: "NIF del perceptor"

      - nombre: nombre_perceptor
        posicion: [27, 66]
        tipo: alfanumerico
        longitud: 40
        fuente: "declarado.nombre"
        descripcion: "Apellidos y nombre o razon social del perceptor"

      - nombre: clave_tipo
        posicion: [67, 68]
        tipo: alfanumerico
        longitud: 2
        fuente: "declarado.clave_tipo"
        descripcion: "Clave tipo rendimiento: 01=dividendos, 02=intereses, 03=amortizacion activos, 04=otros"
        valores_validos: ["01", "02", "03", "04", "05", "06", "09"]

      - nombre: subclave
        posicion: [69, 70]
        tipo: alfanumerico
        longitud: 2
        fuente: "declarado.subclave"
        descripcion: "Subclave del rendimiento"

      - nombre: percepcion_dineraria
        posicion: [71, 87]
        tipo: numerico_signo
        longitud: 17
        decimales: 2
        fuente: "declarado.percepcion_dineraria"
        descripcion: "Importe de percepciones dinerarias"

      - nombre: retencion_dineraria
        posicion: [88, 104]
        tipo: numerico_signo
        longitud: 17
        decimales: 2
        fuente: "declarado.retencion_dineraria"
        descripcion: "Retenciones sobre percepciones dinerarias"

      - nombre: porcentaje_retencion
        posicion: [105, 108]
        tipo: numerico
        longitud: 4
        decimales: 2
        fuente: "declarado.porcentaje_retencion"
        descripcion: "Porcentaje de retencion aplicado (formato NNDD)"

      - nombre: percepcion_especie_valor
        posicion: [109, 125]
        tipo: numerico_signo
        longitud: 17
        decimales: 2
        fuente: "declarado.percepcion_especie_valor"
        descripcion: "Valoracion percepciones en especie"

      - nombre: ingreso_cuenta_especie
        posicion: [126, 142]
        tipo: numerico_signo
        longitud: 17
        decimales: 2
        fuente: "declarado.ingreso_cuenta_especie"
        descripcion: "Ingresos a cuenta percepciones en especie"

      - nombre: naturaleza_perceptor
        posicion: [143, 143]
        tipo: alfanumerico
        longitud: 1
        fuente: "declarado.naturaleza"
        descripcion: "Naturaleza perceptor: F=fisica, J=juridica"
        valores_validos: ["F", "J", " "]

      - nombre: nif_representante
        posicion: [144, 152]
        tipo: alfanumerico
        longitud: 9
        fuente: "declarado.nif_representante"
        descripcion: "NIF del representante (si aplica)"

      - nombre: blancos_153_500
        posicion: [153, 500]
        tipo: alfanumerico
        longitud: 348
        valor_fijo: ""
        descripcion: "Blancos hasta fin de registro"

validaciones:
  - regla: "sum(perceptor.retencion_dineraria) + sum(perceptor.ingreso_cuenta_especie) == declarante.casilla_11 + declarante.casilla_13"
    nivel: error
    mensaje: "La suma de retenciones de perceptores debe igualar el total declarante"

  - regla: "sum(perceptor.percepcion_dineraria) == declarante.casilla_10"
    nivel: error
    mensaje: "La suma de percepciones dinerarias debe igualar casilla 10"

  - regla: "count(perceptores) == declarante.num_total_registros"
    nivel: error
    mensaje: "El numero de registros de perceptores debe coincidir con el declarado"

  - regla: "perceptor.clave_tipo in ['01','02','03','04','05','06','09']"
    nivel: error
    mensaje: "Clave de tipo de rendimiento invalida"
