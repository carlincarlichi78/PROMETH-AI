# Mapeo palabras clave OCR -> subcuenta de gasto
# Nivel 4 del clasificador: confianza 60%
# Busqueda case-insensitive en concepto/descripcion OCR

# Grupo 60 - Compras
compras:
  palabras: ["compra", "mercaderia", "materia prima", "aprovisionamiento"]
  subcuenta: "6000000000"

