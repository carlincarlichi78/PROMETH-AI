# deploy.yml — CI/CD: tests → build → Docker → deploy al servidor
# Trigger: push a main
# Secrets requeridos en GitHub:
#   SSH_HOST, SSH_USER, SSH_PRIVATE_KEY
#   SFCE_JWT_SECRET, SFCE_DB_PASSWORD
#   MISTRAL_API_KEY, OPENAI_API_KEY, GEMINI_API_KEY, FS_API_TOKEN

name: Deploy → prometh-ai.es

on:
  push:
    branches: [main]
  workflow_dispatch:           # Permite trigger manual desde la UI de GitHub

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/spice

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Tests backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sfce_test
          POSTGRES_USER: sfce_user
          POSTGRES_PASSWORD: test_password_ci
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      SFCE_DB_TYPE: postgresql
      SFCE_DB_HOST: localhost
      SFCE_DB_PORT: 5432
      SFCE_DB_USER: sfce_user
      SFCE_DB_PASSWORD: test_password_ci
      SFCE_DB_NAME: sfce_test
      SFCE_JWT_SECRET: ${{ secrets.SFCE_JWT_SECRET }}
      SFCE_FERNET_KEY: ${{ secrets.SFCE_FERNET_KEY }}
      # API keys: los tests OCR usan mocks, pero las vars deben existir
      MISTRAL_API_KEY: test_key_ci
      OPENAI_API_KEY: test_key_ci
      GEMINI_API_KEY: test_key_ci
      FS_API_TOKEN: test_key_ci

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar deps sistema (WeasyPrint)
        run: sudo apt-get install -y -q libpango-1.0-0 libcairo2 libgdk-pixbuf2.0-0 libffi-dev

      - name: Instalar dependencias
        run: pip install -r requirements.txt && pip install -e ".[dev]"

      - name: Ejecutar tests
        run: python -m pytest --tb=short -q

  # ────────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build React dashboard
    runs-on: ubuntu-latest
    # Corre en PARALELO con `test` (sin dependencia)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Instalar dependencias npm
        run: npm ci
        working-directory: dashboard

      - name: Build producción
        run: npm run build
        working-directory: dashboard

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard/dist/
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────────────
  build-docker:
    name: Build y push imagen Docker
    runs-on: ubuntu-latest
    needs: test           # Solo si los tests pasan
    permissions:
      contents: read
      packages: write     # Para push a GHCR

    outputs:
      tags: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Liberar espacio en disco
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/share/boost
          sudo docker system prune -af --volumes 2>/dev/null || true
          df -h /

      - uses: actions/checkout@v4

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadatos de imagen (tags y labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build y push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          platforms: linux/amd64
          # Cache entre builds (más rápido cuando solo cambia código)
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy al servidor
    runs-on: ubuntu-latest
    needs: [build-docker, build-frontend]   # Ambos deben completar

    steps:
      - name: Descargar artefacto frontend
        uses: actions/download-artifact@v4
        with:
          name: dashboard-dist
          path: dist/

      - name: Copiar frontend al servidor (rsync via SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/"
          target: "/opt/apps/sfce/dashboard_dist_new/"

      - name: Deploy API y activar frontend
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN,GHCR_USER
          script: |
            set -e
            cd /opt/apps/sfce

            # Autenticar en GHCR para poder hacer pull de imagen privada
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # Activar nuevo frontend (swap atómico)
            rm -rf dashboard_dist_old
            mv dashboard_dist dashboard_dist_old 2>/dev/null || true
            mv dashboard_dist_new/dist dashboard_dist
            rm -rf dashboard_dist_old dashboard_dist_new

            # Actualizar imagen Docker
            docker compose pull sfce_api

            # Reiniciar con nueva imagen (compose espera al health check)
            docker compose up -d --remove-orphans sfce_api

            # Recargar nginx sin downtime
            docker exec nginx nginx -s reload

            echo "✓ Deploy completado: $(date)"
            echo "  Imagen: $(docker inspect sfce_api --format '{{.Config.Image}}')"

  # ────────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke test post-deploy
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Esperar API lista
        run: |
          echo "Esperando que la API responda..."
          STATUS=""
          for i in $(seq 1 12); do
            STATUS=$(curl -sf https://api.prometh-ai.es/api/health 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',''))" 2>/dev/null || echo "")
            if [ "$STATUS" = "ok" ]; then
              echo "API lista en intento $i"
              break
            fi
            echo "Intento $i/12 — esperando 5s..."
            sleep 5
          done
          [ "$STATUS" = "ok" ] || (echo "API no respondio en 60s" && exit 1)

      - name: Lanzar smoke
        id: smoke
        run: |
          SESSION_ID=$(curl -sf -X POST \
            "https://api.prometh-ai.es/api/testing/ejecutar" \
            -H "Authorization: Bearer ${{ secrets.SFCE_CI_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"modo":"smoke"}' \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('sesion_id',''))")
          echo "SESSION_ID=$SESSION_ID"
          echo "sesion_id=$SESSION_ID" >> $GITHUB_OUTPUT
          [ -n "$SESSION_ID" ] || (echo "No se obtuvo sesion_id" && exit 1)

      - name: Esperar resultado smoke (max 3 min)
        run: |
          for i in $(seq 1 36); do
            RESULT=$(curl -sf \
              "https://api.prometh-ai.es/api/testing/sesiones/${{ steps.smoke.outputs.sesion_id }}" \
              -H "Authorization: Bearer ${{ secrets.SFCE_CI_TOKEN }}" 2>/dev/null || echo "{}")
            ESTADO=$(echo $RESULT | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sesion',{}).get('estado',''))" 2>/dev/null || echo "")
            BUGS=$(echo $RESULT | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sesion',{}).get('total_bugs',0))" 2>/dev/null || echo "0")
            echo "[$i/36] estado=$ESTADO bugs=$BUGS"
            if [ "$ESTADO" = "completado" ]; then
              if [ "$BUGS" = "0" ]; then
                echo "SMOKE OK: 0 bugs"
                exit 0
              else
                echo "SMOKE FAILED: $BUGS bugs detectados"
                exit 1
              fi
            fi
            sleep 5
          done
          echo "SMOKE TIMEOUT: sesion no completo en 3 minutos"
          exit 1
