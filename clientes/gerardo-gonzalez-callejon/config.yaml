    - "Podologia exenta: no genera IVA repercutido ni permite deduccion IVA soportado en esa actividad"
    - "Gastos compartidos se reparten por metros cuadrados entre ambas actividades"
    - "Colaboradoras autonomas (May, Marta) facturan exentas IVA con retencion IRPF 7%"
