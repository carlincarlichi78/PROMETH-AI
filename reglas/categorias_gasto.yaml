# reglas/categorias_gasto.yaml
# Base de conocimiento fiscal España — categorías de gasto
# Base legal: LIVA 37/1992, LIRPF 35/2006, LIS 27/2014
# Vigente: ejercicio 2025
# Uso: ClasificadorFiscal.clasificar() carga este archivo para determinar
#      el tratamiento fiscal de cada gasto según keywords + CIF + OCR.
#
# Campos por categoría:
#   descripcion       — texto legible
#   subcuenta         — código PGC 10 dígitos
#   iva_codimpuesto   — IVA0 | IVA4 | IVA5 | IVA10 | IVA21
#   iva_tasa          — porcentaje numérico
#   iva_deducible_pct — 0 | 50 | 100
#   exento_art20      — true si exento sin derecho a deducción
#   irpf_pct          — null o porcentaje retención
#   irpf_condicion    — condición que activa la retención (null = siempre)
#   operaciones_extra — lista de operaciones adicionales de correction.py
#   preguntas         — lista de campos que el wizard debe preguntar
#   subcategoria_por_respuesta — tratamiento alternativo según respuesta wizard
#   keywords_proveedor — palabras clave en nombre del proveedor (case-insensitive)
#   keywords_lineas   — palabras clave en líneas de la factura
#   base_legal        — artículo legal de referencia
#   notas             — aclaraciones para el operador

