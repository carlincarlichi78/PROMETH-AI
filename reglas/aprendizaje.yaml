- id: evol_001
  regex: Discrepancias.*Total.*esperado.*FS.*intracomunitario|regimen.*intracomunitario.*IVA
  estrategia: adaptar_campos_ocr
  tipo_doc:
  - FC
  aprendido: '2026-02-27'
  exitos: 0
  fallos: 0
  origen: manual
  descripcion: 'Factura intracomunitaria (Google, Meta, etc.) — OCR extrae total sin
    IVA pero FS aplica IVA21 encima. Fix: usar codimpuesto=IVA0 y añadir autorepercusion
    post-registro (472 DEBE + 477 HABER). Implementado en _construir_form_data + _aplicar_autorepercusion_intracom.

    '
- id: evol_002
  regex: Discrepancias.*Total.*lineas.*IVA.*incluido|sum.*precio_unitario.*total
  estrategia: derivar_importes
  tipo_doc:
  - SUM
  - FC
  aprendido: '2026-02-27'
  exitos: 0
  fallos: 0
  origen: manual
  descripcion: 'Lineas OCR con precio_unitario que incluye IVA. sum(precios) ≈ total,
    no base. Fix: detectar y dividir por (1+IVA/100) antes de enviar a FS. Implementado
    en _construir_form_data (precios_incluyen_iva).

    '
