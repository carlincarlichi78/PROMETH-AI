# Mapeo CIF prefix -> pais -> regimen -> IVA esperado
# Usado en check F1

prefijos_cif:
  # Espana
  - prefijos: ["A", "B", "C", "D", "E", "F", "G", "H", "J", "N", "P", "Q", "R", "S", "U", "V", "W"]
    pais: ESP
    regimen: general
    iva_factura: [0, 4, 5, 10, 21]
    nota: "CIF espanol (letra + 7dig + control)"

  - prefijos: ["ES"]
    pais: ESP
    regimen: general
    iva_factura: [0, 4, 5, 10, 21]
    nota: "NIF con prefijo pais"

  # NIE espanol
  - prefijos: ["X", "Y", "Z"]
    pais: ESP
    regimen: general
    iva_factura: [0, 4, 5, 10, 21]
    nota: "NIE (extranjero residente)"

  # UE intracomunitario
  - prefijos: ["PT"]
    pais: PRT
    regimen: intracomunitario
    iva_factura: [0]
    nota: "Portugal — intracomunitario (miembro UE). Corregido: era incorrecto como extracomunitario."

