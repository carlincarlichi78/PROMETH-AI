upstream sfce_api_app {
    server sfce_api:8000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name app.prometh-ai.es;
    location /.well-known/acme-challenge/ { root /opt/apps/sfce/certbot; }
    location / { return 301 https://$server_name$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name app.prometh-ai.es;

    ssl_certificate     /etc/letsencrypt/live/app.prometh-ai.es/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.prometh-ai.es/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL_app:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /opt/apps/sfce/dashboard_dist;
    index index.html;

    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* (sw\.js|workbox-[^/]+\.js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://sfce_api_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 26m;
    }

    location /api/ws {
        proxy_pass http://sfce_api_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
        try_files $uri $uri/ /index.html;
    }
}
