# 00-security.conf — Security headers globales nginx
# Aplicado a todos los virtual hosts
# Incluido dentro del bloque http {} via conf.d/
# ---------------------------------------------------------------------------

# Ocultar versión de nginx en headers y páginas de error
server_tokens off;

# HSTS — forzar HTTPS durante 1 año, incluir subdominios
# Precaución: una vez activado, los navegadores no aceptarán HTTP durante max-age
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# Prevenir clickjacking — solo permite iframes del mismo origen
add_header X-Frame-Options "SAMEORIGIN" always;

# Prevenir MIME-type sniffing
add_header X-Content-Type-Options "nosniff" always;

# Referrer — enviar origen solo en mismo dominio; HTTPS→HTTP sin referrer
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions-Policy — deshabilitar APIs sensibles por defecto
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

# CSP base — las apps específicas pueden añadir sus propias reglas
# Solo aplica si la app no define su propio Content-Security-Policy
# (se puede sobreescribir en el server block de cada app)
# add_header Content-Security-Policy "default-src 'self'" always;
