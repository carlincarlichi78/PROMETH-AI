# uptime-kuma.conf — Proxy nginx para Uptime Kuma
# Activo cuando se añada DNS: uptime.TUDOMINIO.com
# Uptime Kuma requiere WebSocket (proxy_http_version 1.1 + Upgrade/Connection headers)
# Auth gestionada por Uptime Kuma (configurar admin en primer acceso)
# ---------------------------------------------------------------------------

# INSTRUCCIONES DE ACTIVACIÓN:
# 1. Crear registro DNS: uptime.TUDOMINIO.com → 65.108.60.69
# 2. Obtener certificado: certbot certonly --webroot -d uptime.TUDOMINIO.com
# 3. Reemplazar TUDOMINIO.com por el dominio real en este archivo
# 4. Copiar a /opt/infra/nginx/conf.d/uptime-kuma.conf
# 5. docker exec nginx nginx -s reload

upstream uptime_kuma_upstream {
    # uptime_kuma está en la red nginx_default → nginx resuelve por nombre de contenedor
    server uptime_kuma:3001;
}

server {
    listen 80;
    listen [::]:80;
    server_name uptime.TUDOMINIO.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name uptime.TUDOMINIO.com;

    ssl_certificate /etc/letsencrypt/live/uptime.TUDOMINIO.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/uptime.TUDOMINIO.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    location / {
        proxy_pass http://uptime_kuma_upstream;
        proxy_http_version 1.1;

        # WebSocket (requerido por Uptime Kuma)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;  # WebSocket long-lived connections
        proxy_send_timeout 3600s;
    }
}
